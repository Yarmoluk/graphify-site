<script>
// ═══════════════════════════════════════

// Nodes with depth layers (0 = center, 4 = outer)
const allNodes = [

  { id: 'cto', name: 'CTO', cat: 'stakeholder', depth: 3, desc: 'Evaluates architecture. Values: vendor lock-in elimination, scalability.' },
  { id: 'ceo', name: 'CEO', cat: 'stakeholder', depth: 3, desc: 'Approves budget. Values: competitive moat, speed to value.' },

  // Depth 4 — Outcomes (outer ring)
  { id: 'moat', name: 'Defensible Moat', cat: 'outcome', depth: 4, desc: 'Structured knowledge compounds. Models commoditize. Your graph appreciates.' },
  { id: 'model_agnostic', name: 'Model Agnostic', cat: 'outcome', depth: 4, desc: 'Same .md works in Claude, GPT-4, Gemini, Llama. Switch freely.' },

  { id: 'enterprise_ready', name: 'Enterprise Ready', cat: 'outcome', depth: 4, desc: 'Governance, audit trails, version control. Production-grade from day one.' },

const allEdges = [
  // From nexus
  { source: 'kg', target: 'context' }, { source: 'kg', target: 'ontology' },
  { source: 'kg', target: 'mcp' }, { source: 'kg', target: 'graphrag' },
  { source: 'kg', target: 'md_serial' }, { source: 'kg', target: 'agent_skill' },

  // Depth 1 interconnections
  { source: 'context', target: 'mcp' }, { source: 'ontology', target: 'md_serial' },
  { source: 'graphrag', target: 'mcp' }, { source: 'agent_skill', target: 'md_serial' },
  { source: 'context', target: 'agent_skill' },

  // Depth 1 → 2
  { source: 'kg', target: 'ingestion' }, { source: 'kg', target: 'traversal' },
  { source: 'context', target: 'compression' }, { source: 'context', target: 'one_shot' },
  { source: 'mcp', target: 'claude' }, { source: 'graphrag', target: 'neo4j' },
  { source: 'graphrag', target: 'vector_db' }, { source: 'md_serial', target: 'markdown' },
  { source: 'md_serial', target: 'github' }, { source: 'ontology', target: 'extraction' },
  { source: 'agent_skill', target: 'claude' }, { source: 'context', target: 'llm' },

  // Depth 2 interconnections
  { source: 'ingestion', target: 'extraction' }, { source: 'extraction', target: 'rel_mapping' },
  { source: 'rel_mapping', target: 'compression' }, { source: 'compression', target: 'md_serial' },
  { source: 'traversal', target: 'one_shot' }, { source: 'traversal', target: 'audit_trail' },
  { source: 'one_shot', target: 'validation' }, { source: 'audit_trail', target: 'validation' },
  { source: 'llm', target: 'claude' }, { source: 'neo4j', target: 'traversal' },
  { source: 'vector_db', target: 'llm' }, { source: 'markdown', target: 'github' },

  // Depth 2 → 3 (metrics)
  { source: 'graphrag', target: 'hop_170x' }, { source: 'graphrag', target: 'ms_83' },
  { source: 'traversal', target: 'step_77' }, { source: 'compression', target: 'compress_93' },
  { source: 'one_shot', target: 'iteration_80' }, { source: 'context', target: 'pilot_95' },

  // Depth 2 → 3 (stakeholders)
  { source: 'llm', target: 'cto' }, { source: 'context', target: 'ceo' },
  { source: 'neo4j', target: 'data_eng' }, { source: 'ingestion', target: 'domain_expert' },
  { source: 'one_shot', target: 'end_user' },

  // Depth 3 → 4 (outcomes)
  { source: 'ceo', target: 'moat' }, { source: 'cto', target: 'model_agnostic' },
  { source: 'cto', target: 'zero_infra' }, { source: 'domain_expert', target: 'knowledge_retention' },
  { source: 'ceo', target: 'roi' }, { source: 'end_user', target: 'speed' },
  { source: 'data_eng', target: 'enterprise_ready' },
  { source: 'hop_170x', target: 'moat' }, { source: 'ms_83', target: 'roi' },
  { source: 'compress_93', target: 'zero_infra' }, { source: 'iteration_80', target: 'speed' },
  { source: 'pilot_95', target: 'enterprise_ready' }, { source: 'step_77', target: 'moat' },

  // Cross-cutting outcome links
  { source: 'moat', target: 'roi' }, { source: 'model_agnostic', target: 'zero_infra' },
  { source: 'knowledge_retention', target: 'enterprise_ready' }, { source: 'speed', target: 'roi' },
];

// ═══════════════════════════════════════
// CANVAS RENDERER WITH BLOOM
// ═══════════════════════════════════════

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, mx = 0, my = 0, currentDepth = -1, isAnimating = false;
const DPR = window.devicePixelRatio || 1;

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
resize();
window.addEventListener('resize', resize);
window.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

// Node state
const nodes = [];
const edges = [];
const nodeMap = {};
const connCount = {};

// Pre-calculate connection counts
allEdges.forEach(e => {
  connCount[e.source] = (connCount[e.source] || 0) + 1;
  connCount[e.target] = (connCount[e.target] || 0) + 1;
});

// Initialize all nodes (hidden)
allNodes.forEach(n => {
  const node = {
    ...n,
    x: W / 2 + (Math.random() - 0.5) * 10,
    y: H / 2 + (Math.random() - 0.5) * 10,
    tx: W / 2, ty: H / 2,
    vx: 0, vy: 0,
    size: n.size || Math.max(6, (connCount[n.id] || 1) * 2.2),
    opacity: 0,
    targetOpacity: 0,
    pulsePhase: Math.random() * Math.PI * 2,
    visible: false,
    hovered: false,
  };
  nodes.push(node);
  nodeMap[n.id] = node;
});

// Initialize edges (hidden)
allEdges.forEach(e => {
  edges.push({
    source: e.source,
    target: e.target,
    opacity: 0,
    targetOpacity: 0,
    visible: false,
    particles: [],
    particleTimer: Math.random() * 120,
  });
});

// ═══════════════════════════════════════
// LAYOUT — Radial unfolding from center
// ═══════════════════════════════════════

function calculateLayout(depth) {
  const visible = nodes.filter(n => n.depth <= depth);
  const center = { x: W / 2, y: H / 2 };

  // Place nexus at center
  const nexus = nodeMap['kg'];
  if (nexus) { nexus.tx = center.x; nexus.ty = center.y; }

  // Place each depth ring
  for (let d = 1; d <= depth; d++) {
    const ringNodes = visible.filter(n => n.depth === d);
    const radius = d * Math.min(W, H) * 0.18;
    const angleStep = (Math.PI * 2) / ringNodes.length;
    const offset = d * 0.3; // Slight rotation per ring

    ringNodes.forEach((n, i) => {
      const angle = angleStep * i + offset;
      n.tx = center.x + Math.cos(angle) * radius;
      n.ty = center.y + Math.sin(angle) * radius;
    });
  }
}

// ═══════════════════════════════════════
// UNFOLD ANIMATION
// ═══════════════════════════════════════

function unfoldToDepth(depth) {
  currentDepth = depth;

  // Update button states
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('btn' + depth);
  if (btn) btn.classList.add('active');

  // Show stage label
  const label = document.getElementById('stageLabel');
  const stage = stages[depth] || stages[4];
  document.getElementById('stageTitle').textContent = stage.title;
  document.getElementById('stageSubtitle').textContent = stage.subtitle;
  label.classList.add('visible');
  setTimeout(() => label.classList.remove('visible'), 2500);

  // Show/hide nodes
  nodes.forEach(n => {
    if (n.depth <= depth) {
      n.visible = true;
      n.targetOpacity = 1;
      if (n.depth === depth) {
        // New nodes emerge gently from parent position
        const parent = findParent(n);
        if (parent && n.opacity < 0.05) {
          n.x = parent.x + (Math.random() - 0.5) * 20;
          n.y = parent.y + (Math.random() - 0.5) * 20;
          n.vx = 0;
          n.vy = 0;
        }
      }
    } else {
      n.targetOpacity = 0;
    }
  });

  // Show/hide edges
  edges.forEach(e => {
    const s = nodeMap[e.source];
    const t = nodeMap[e.target];
    if (s && t && s.depth <= depth && t.depth <= depth) {
      e.visible = true;
      e.targetOpacity = 1;
    } else {
      e.targetOpacity = 0;
    }
  });

  calculateLayout(depth);
  updateCounters(depth);
}

function findParent(node) {
  for (const e of allEdges) {
    if (e.target === node.id) {
      const parent = nodeMap[e.source];
      if (parent && parent.depth < node.depth) return parent;
    }
    if (e.source === node.id) {
      const parent = nodeMap[e.target];
      if (parent && parent.depth < node.depth) return parent;
    }
  }
  return nodeMap['kg'];
}

async function autoUnfold() {
  if (isAnimating) return;
  isAnimating = true;
  document.getElementById('btnAuto').classList.add('active');

  for (let d = 0; d <= 4; d++) {
    unfoldToDepth(d);
    await sleep(3500);
  }
  isAnimating = false;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function updateCounters(depth) {
  const visibleNodes = nodes.filter(n => n.depth <= depth).length;
  const visibleEdges = edges.filter(e => {
    const s = nodeMap[e.source]; const t = nodeMap[e.target];
    return s && t && s.depth <= depth && t.depth <= depth;
  }).length;
  const paths = Math.round(Math.pow(visibleEdges * 2 / Math.max(visibleNodes, 1), 3) * visibleNodes);

  animateCounter('nodeCount', visibleNodes);
  animateCounter('edgeCount', visibleEdges);
  animateCounter('pathCount', paths);
  document.getElementById('depthCount').textContent = depth;
}

function animateCounter(id, target) {
  const el = document.getElementById(id);
  const start = parseInt(el.textContent.replace(/,/g, '')) || 0;
  const startTime = performance.now();
  const duration = 1200;
  function update(t) {
    const p = Math.min((t - startTime) / duration, 1);
    const eased = 1 - Math.pow(1 - p, 3);
    el.textContent = Math.round(start + (target - start) * eased).toLocaleString();
    if (p < 1) requestAnimationFrame(update);
  }
  requestAnimationFrame(update);
}

// ═══════════════════════════════════════
// PHYSICS — Simple spring simulation
// ═══════════════════════════════════════

function physics() {
  const damping = 0.97;
  const spring = 0.003;

  nodes.forEach(n => {
    if (!n.visible) return;

    // Gentle spring to target position
    const dx = n.tx - n.x;
    const dy = n.ty - n.y;
    n.vx += dx * spring;
    n.vy += dy * spring;

    // Soft repulsion from other visible nodes
    nodes.forEach(m => {
      if (m === n || !m.visible || m.opacity < 0.1) return;
      const ddx = n.x - m.x;
      const ddy = n.y - m.y;
      const dist = Math.sqrt(ddx * ddx + ddy * ddy) || 1;
      const minDist = (n.size + m.size) * 3;
      if (dist < minDist) {
        const force = (minDist - dist) / dist * 0.05;
        n.vx += ddx * force;
        n.vy += ddy * force;
      }
    });

    n.vx *= damping;
    n.vy *= damping;
    // Cap velocity — no bouncing, just slow drift
    const maxV = 1.2;
    n.vx = Math.max(-maxV, Math.min(maxV, n.vx));
    n.vy = Math.max(-maxV, Math.min(maxV, n.vy));
    n.x += n.vx;
    n.y += n.vy;

    // Slow, organic opacity fade-in
    n.opacity += (n.targetOpacity - n.opacity) * 0.02;
    if (n.opacity < 0.005 && n.targetOpacity === 0) {
      n.visible = false;
      n.opacity = 0;
    }
  });

  // Edge opacity — even slower for trailing effect
  edges.forEach(e => {
    e.opacity += (e.targetOpacity - e.opacity) * 0.015;
    if (e.opacity < 0.005 && e.targetOpacity === 0) {
      e.visible = false;
      e.opacity = 0;
    }
  });
}

// ═══════════════════════════════════════
// RENDER — Bloom, glow, particles
// ═══════════════════════════════════════

let time = 0;
let hoveredNode = null;
let selectedNode = null;

function render() {
  time++;
  physics();

  ctx.clearRect(0, 0, W, H);

  // Background gradient
  const bg = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H) * 0.7);
  bg.addColorStop(0, '#050510');
  bg.addColorStop(0.5, '#020208');
  bg.addColorStop(1, '#000000');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Subtle grid
  ctx.strokeStyle = 'rgba(79,143,255,0.015)';
  ctx.lineWidth = 0.5;
  const gridSize = 60;
  for (let x = 0; x < W; x += gridSize) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += gridSize) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Draw edges
  edges.forEach(e => {
    if (!e.visible && e.opacity < 0.01) return;
    const s = nodeMap[e.source];
    const t = nodeMap[e.target];
    if (!s || !t) return;

    const alpha = e.opacity * 0.25;
    const highlighted = (hoveredNode && (hoveredNode.id === e.source || hoveredNode.id === e.target));

    // Edge line
    ctx.beginPath();
    ctx.moveTo(s.x, s.y);
    ctx.lineTo(t.x, t.y);

    if (highlighted) {
      ctx.strokeStyle = `rgba(79,143,255,${e.opacity * 0.6})`;
      ctx.lineWidth = 2;
      // Glow
      ctx.shadowColor = 'rgba(79,143,255,0.4)';
      ctx.shadowBlur = 15;
    } else {
      ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
      ctx.lineWidth = 0.6;
      ctx.shadowBlur = 0;
    }
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Particles flowing along edge
    e.particleTimer++;
    if (e.particleTimer > 80 && e.opacity > 0.3) {
      e.particles.push({ t: 0, speed: 0.004 + Math.random() * 0.004 });
      e.particleTimer = 0;
    }

    e.particles = e.particles.filter(p => {
      p.t += p.speed;
      if (p.t > 1) return false;

      const px = s.x + (t.x - s.x) * p.t;
      const py = s.y + (t.y - s.y) * p.t;
      const pAlpha = Math.sin(p.t * Math.PI) * e.opacity;

      ctx.beginPath();
      ctx.arc(px, py, 1.5, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(79,143,255,${pAlpha * 0.8})`;
      ctx.shadowColor = 'rgba(79,143,255,0.6)';
      ctx.shadowBlur = 8;
      ctx.fill();
      ctx.shadowBlur = 0;

      return true;
    });
  });

  // Draw nodes
  hoveredNode = null;
  nodes.forEach(n => {
    if (!n.visible && n.opacity < 0.01) return;

    const cat = categories[n.cat];
    const [r, g, b] = cat.color;
    const [gr, gg, gb] = cat.glow;
    const pulse = 1 + Math.sin(time * 0.03 + n.pulsePhase) * 0.15;
    const size = n.size * pulse;

    // Check hover
    const dx = mx - n.x;
    const dy = my - n.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < size + 10) {
      hoveredNode = n;
      n.hovered = true;
    } else {
      n.hovered = false;
    }

    const isHighlighted = n.hovered || (selectedNode && selectedNode.id === n.id);

    // Outer glow
    const glowSize = isHighlighted ? size * 4 : size * 2.5;
    const glowGrad = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, glowSize);
    glowGrad.addColorStop(0, `rgba(${gr},${gg},${gb},${n.opacity * (isHighlighted ? 0.3 : 0.12)})`);
    glowGrad.addColorStop(0.5, `rgba(${gr},${gg},${gb},${n.opacity * 0.03})`);
    glowGrad.addColorStop(1, `rgba(${gr},${gg},${gb},0)`);
    ctx.beginPath();
    ctx.arc(n.x, n.y, glowSize, 0, Math.PI * 2);
    ctx.fillStyle = glowGrad;
    ctx.fill();

    // Core circle
    const coreGrad = ctx.createRadialGradient(n.x - size * 0.2, n.y - size * 0.2, 0, n.x, n.y, size);
    coreGrad.addColorStop(0, `rgba(${Math.min(r+60,255)},${Math.min(g+60,255)},${Math.min(b+60,255)},${n.opacity})`);
    coreGrad.addColorStop(0.7, `rgba(${r},${g},${b},${n.opacity * 0.9})`);
    coreGrad.addColorStop(1, `rgba(${r},${g},${b},${n.opacity * 0.5})`);

    ctx.beginPath();
    ctx.arc(n.x, n.y, size, 0, Math.PI * 2);
    ctx.fillStyle = coreGrad;
    ctx.shadowColor = `rgba(${gr},${gg},${gb},${n.opacity * 0.6})`;
    ctx.shadowBlur = isHighlighted ? 30 : 15;
    ctx.fill();
    ctx.shadowBlur = 0;

    // Ring highlight on hover
    if (isHighlighted) {
      ctx.beginPath();
      ctx.arc(n.x, n.y, size + 3, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(${r},${g},${b},${n.opacity * 0.6})`;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    // Label — crisp, no blur
    if (n.opacity > 0.3) {
      const fontSize = n.cat === 'core' ? 14 : (isHighlighted ? 12 : 10);
      ctx.save();
      ctx.shadowBlur = 0;
      ctx.shadowColor = 'transparent';
      ctx.font = `600 ${fontSize}px -apple-system, "Helvetica Neue", Arial, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';

      // Dark background pill for readability
      const textWidth = ctx.measureText(n.name).width;
      const pillPad = 4;
      const pillX = n.x - textWidth / 2 - pillPad;
      const pillY = n.y + size + 8;
      const pillW = textWidth + pillPad * 2;
      const pillH = fontSize + pillPad * 2;
      ctx.fillStyle = `rgba(0,0,0,${n.opacity * 0.6})`;
      ctx.beginPath();
      ctx.roundRect(pillX, pillY, pillW, pillH, 4);
      ctx.fill();

      // Text
      ctx.fillStyle = `rgba(255,255,255,${n.opacity * (isHighlighted ? 1 : 0.85)})`;
      ctx.fillText(n.name, n.x, pillY + pillPad);
      ctx.restore();
    }
  });

  // Cursor
  canvas.style.cursor = hoveredNode ? 'pointer' : 'default';

  requestAnimationFrame(render);
}

// ═══════════════════════════════════════
// INTERACTION
// ═══════════════════════════════════════

canvas.addEventListener('click', e => {
  if (hoveredNode) {
    selectedNode = hoveredNode;
    const cat = categories[hoveredNode.cat];
    const [r, g, b] = cat.color;

    const info = document.getElementById('nodeInfo');
    document.getElementById('nodeName').textContent = hoveredNode.name;
    document.getElementById('nodeDesc').textContent = hoveredNode.desc;
    document.getElementById('nodeConns').textContent = connCount[hoveredNode.id] || 0;

    const typeEl = document.getElementById('nodeType');
    typeEl.textContent = cat.label;
    typeEl.style.background = `rgba(${r},${g},${b},0.15)`;
    typeEl.style.color = `rgb(${r},${g},${b})`;
    info.style.display = 'block';
  } else {
    selectedNode = null;
    document.getElementById('nodeInfo').style.display = 'none';
  }
});

// ═══════════════════════════════════════
// START
// ═══════════════════════════════════════

render();

// Auto-start unfolding after 1 second
setTimeout(() => autoUnfold(), 1000);

</script>
</body>
</html>
